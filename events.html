<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Social Hx</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark px-3">
    <div class="container-fluid">

        <!-- Logo -->
        <a class="navbar-brand fw-bold" href="index.html">
            Social Hx
        </a>

        <!-- Navigation Links -->
        <div class="d-flex align-items-center gap-3">

            <a class="nav-link text-white" href="index.html">
                Home
            </a>

            <a class="nav-link active text-white" href="events.html">
                Events
            </a>

            <a class="nav-link text-white" href="prescriber.html">
                Prescriptions
            </a>

            <a class="nav-link text-white" href="dashboard.html">
                Dashboard
            </a>

        </div>

        <!-- Right Side Button -->
        <div class="ms-auto">
            <a href="login.html" class="btn btn-primary">
                Sign In
            </a>

            <button onclick="logout()" class="btn btn-warning">Logout</button>
        </div>

    </div>
</nav>


    <!-- CONTENT -->
    <div class="container mt-4">
        <div class="p-5 bg-light rounded-3 border">
            <h1 class="portal-heading">Events</h1>
            <p class="fs-5">Browse and explore campus events available for social prescribing.</p>
        </div>

        <div class="card mt-4">
        <div class="card-header">
            Filters
        </div>
        <div class="card-body">
            <button class="filter-chip">All</button>
            <button class="filter-chip">Academic</button>
            <button class="filter-chip">Social</button>
            <button class="filter-chip">Wellness</button>
            <button class="filter-chip">Arts</button>
            <button class="filter-chip">Sports</button>
        </div>
    </div>

        <div class="card mt-4">
            <div class="card-header">
                Event List (Placeholder)
            </div>
            <div class="card-body">
                <div id="eventsContainer" class="row"></div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        © 2026 Campus Connect | Social Prescribing Initiative
    </footer>

    <script>
    if (!localStorage.getItem("loggedInPrescriber")) {
        window.location.href = "login.html";
    }
    </script>

    <script>
    function logout() {
        localStorage.removeItem("loggedInPrescriber");
        window.location.href = "index.html";
    }
    </script>

    <script src="script.js"></script>
</body>

</html>
